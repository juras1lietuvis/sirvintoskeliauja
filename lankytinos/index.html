<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lankytinos vietos ir veiklos · Širvintos keliauja</title>
<meta name="theme-color" content="#1a2e1a">
<link rel="manifest" href="../manifest.webmanifest">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --forest: #1a2e1a; --moss: #2d4a2d; --sage: #8fb88f;
  --cream: #f5f0e8; --amber: #d4872a; --gold: #f0b840;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: var(--forest); color: var(--cream); min-height: 100vh; }

.topbar { display: flex; align-items: center; gap: 10px; padding: 0.9rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.07); background: var(--moss); position: sticky; top: 0; z-index: 10; }
.back-btn { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); color: var(--cream); padding: 5px 10px; border-radius: 10px; cursor: pointer; font-size: 0.85rem; text-decoration: none; }
.back-btn:hover { background: rgba(255,255,255,0.12); }
.topbar-title { font-size: 1rem; font-weight: 500; flex: 1; }
.topbar-count { font-size: 0.75rem; color: var(--sage); }

.filter-row { display: flex; gap: 6px; padding: 0.75rem 1rem; overflow-x: auto; border-bottom: 1px solid rgba(255,255,255,0.05); scrollbar-width: none; }
.filter-row::-webkit-scrollbar { display: none; }
.filter-btn { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 500; cursor: pointer; white-space: nowrap; border: 1px solid rgba(255,255,255,0.12); background: transparent; color: rgba(245,240,232,0.65); transition: all 0.15s; flex-shrink: 0; }
.filter-btn:hover { background: rgba(255,255,255,0.07); color: var(--cream); }
.filter-btn.active { background: rgba(240,184,64,0.15); border-color: rgba(240,184,64,0.4); color: var(--gold); }

.places-wrap { padding: 0.75rem 1rem 6rem; max-width: 520px; margin: 0 auto; }
.places-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.place-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 0.85rem; cursor: pointer; transition: background 0.15s, border-color 0.15s; }
.place-card:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.15); }
.place-cat { font-size: 0.65rem; color: var(--sage); margin-bottom: 4px; letter-spacing: 0.04em; }
.place-name { font-size: 0.88rem; font-weight: 500; color: var(--cream); line-height: 1.3; }
.place-card.hidden { display: none; }

.drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 40; display: none; }
.drawer-overlay.show { display: block; }
.drawer { position: fixed; left: 0; right: 0; bottom: 0; z-index: 50; background: var(--moss); border-radius: 20px 20px 0 0; border-top: 1px solid rgba(255,255,255,0.1); padding: 0 1.2rem 2.5rem; max-height: 82vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.3s ease; }
.drawer.open { transform: translateY(0); }
.drawer-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.18); border-radius: 2px; margin: 12px auto 1rem; }
.drawer-cat { font-size: 0.65rem; color: var(--sage); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
.drawer-title { font-family: 'Playfair Display', serif; font-size: 1.25rem; font-weight: 700; color: var(--cream); margin-bottom: 0.7rem; line-height: 1.3; }
.drawer-desc { font-size: 0.88rem; color: rgba(245,240,232,0.78); line-height: 1.65; margin-bottom: 1rem; }
.drawer-info { display: flex; flex-direction: column; gap: 7px; margin-bottom: 1.1rem; background: rgba(0,0,0,0.15); border-radius: 12px; padding: 0.8rem; }
.info-row { display: flex; gap: 10px; font-size: 0.8rem; }
.info-lbl { color: var(--sage); min-width: 52px; flex-shrink: 0; }
.info-val { color: rgba(245,240,232,0.82); word-break: break-word; }
.drawer-btns { display: flex; gap: 8px; }
.btn-map-d { flex: 1; padding: 0.7rem; background: linear-gradient(135deg, var(--amber), var(--gold)); border: none; border-radius: 12px; color: var(--forest); font-weight: 700; font-size: 0.85rem; cursor: pointer; }
.btn-web-d { flex: 1; padding: 0.7rem; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; color: var(--cream); font-size: 0.85rem; cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 4px; }
.btn-map-d:hover { opacity: 0.9; }
.btn-web-d:hover { background: rgba(255,255,255,0.11); }
.drawer-close { position: absolute; top: 14px; right: 14px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); color: var(--cream); width: 30px; height: 30px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
.no-results { text-align: center; padding: 3rem 1rem; color: rgba(245,240,232,0.4); font-size: 0.9rem; display: none; }
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="../">← Grįžti</a>
  <div class="topbar-title">Lankytinos vietos ir veiklos</div>
  <div class="topbar-count" id="count">16 objektų</div>
</div>

<div class="filter-row" id="filter-row"></div>

<div class="places-wrap">
  <div class="places-grid" id="places-grid"></div>
  <div class="no-results" id="no-results">Nėra atitinkančių objektų</div>
</div>

<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <button class="drawer-close" onclick="closeDrawer()">✕</button>
  <div class="drawer-handle"></div>
  <div class="drawer-cat" id="d-cat"></div>
  <div class="drawer-title" id="d-title"></div>
  <div class="drawer-desc" id="d-desc"></div>
  <div class="drawer-info">
    <div class="info-row"><span class="info-lbl">Adresas</span><span class="info-val" id="d-addr"></span></div>
    <div class="info-row"><span class="info-lbl">Tel.</span><span class="info-val" id="d-tel"></span></div>
    <div class="info-row" id="d-web-row"><span class="info-lbl">Svetainė</span><span class="info-val" id="d-web"></span></div>
  </div>
  <div class="drawer-btns">
    <button class="btn-map-d" id="d-map-btn">📍 Rodyti žemėlapyje</button>
    <a class="btn-web-d" id="d-web-btn" href="#" target="_blank" rel="noopener">🌐 Svetainė</a>
  </div>
</div>

<script>
const PLACES = [
  { cat:'Muziejai', name:'Kernavės archeologinės vietovės muziejus', desc:'Susipažinsite su Kernavės archeologine vietove, archeologų darbais bei radiniais. Moderni ekspozicija įdomi visiems, besidomintiems krašto istorija ir archeologija. Vykdomos ekskursijos, edukacijos, ekspozicijos.', addr:'Kerniaus 4a, Kernavė', tel:'+370 382 47385', web:'www.kernave.lt', webUrl:'https://www.kernave.lt', lat:54.8856, lng:24.854 },
  { cat:'Žirgai', name:'ŽSK Širvintų žirgai – Žirgynas', desc:'Laisvalaikio jojimas, jojimo pamokos, ekskursijos, privati erdvė šventėms ir komandoms.', addr:'Ristūnų g. 6, Širvintos', tel:'+370 678 27960', web:'–', webUrl:'', lat:55.043, lng:24.954 },
  { cat:'Žirgai', name:'Žemaitukų žirgų ūkis „Namelis prerijose"', desc:'Jojimas miškais, pasivažinėjimas karieta ar rogėmis, vienos ar kelių dienų žygiai su žirgais, vaikų šventės gamtoje. Edukaciniai užsiėmimai apie žirgus.', addr:'Poguliankos k., Kernavės sen.', tel:'+370 612 16364', web:'www.kernaveszirgai.webs.com', webUrl:'http://www.kernaveszirgai.webs.com', lat:54.89, lng:24.85 },
  { cat:'Pramogos', name:'Vikingų kaimas', desc:'Viduramžiškos pramogos ir patyrimų muziejus po atviru dangumi. Senųjų amatų ir senovinių pramogų parkas šalia Širvintos upės. Senovinio gyvenimo buitis, amatai ir pramogos.', addr:'Širvintų g. 36, Družai', tel:'+370 606 06781', web:'www.vikingukaimas.lt', webUrl:'https://www.vikingukaimas.lt', lat:54.872, lng:24.921 },
  { cat:'Gyvūnai', name:'VŠĮ „Elnių SPA"', desc:'Edukacinis ūkis prie Kernavės su prijaukintais tauriaisiais elniais. Edukacinės programos darželinukams, moksleiviams, suaugusiesiems. Komandos formavimo veiklos verslo klientams.', addr:'Rudeikiškių 4, Kernavės sen.', tel:'+370 699 91900', web:'www.deerspa.com', webUrl:'https://www.deerspa.com', lat:54.878, lng:24.851 },
  { cat:'Edukacija', name:'Ūkis „Lino namai"', desc:'Edukacinė programa „Lino kelias" – lino apdirbimo ekspozicija, pasakojimas apie audinio istoriją ir gamybą. Kasmet rugpjūtį – tradicinė Lino šventė su koncertu ir ūkininkų turgeliu.', addr:'Klevų g. 23, Bagaslaviškis', tel:'+370 685 85428', web:'facebook.com/vosterioukis', webUrl:'https://www.facebook.com/vosterioukis', lat:55.021, lng:24.889 },
  { cat:'Aktyvus laisvalaikis', name:'Bebro kelio iššūkių parkas', desc:'Ekstremalus bėgimas ir kliūčių ruožas laukinės gamtos atmosferoje. Pėsčiųjų žygiai, žygiai pelkėmis, kliūčių ruožai vaikams. Veikia visą šiltąjį sezoną.', addr:'Pamusės 11, Alionių sen.', tel:'+370 684 33303', web:'www.bebroparkas.lt', webUrl:'https://www.bebroparkas.lt', lat:55.031, lng:24.872 },
  { cat:'Menas', name:'S V Mitchell\'s Bardo galerija', desc:'Britų menininko įkurta galerija Kernavės gilumoje. Unikalus labirintas, kuriame įspūdis kuriamas per prieblandą, muziką ir kvapą. Rekomenduojama nuo 16 m.', addr:'Pilkapio g. 17, Kernavė', tel:'+370 610 17920', web:'www.svmitchell.com', webUrl:'http://www.svmitchell.com', lat:54.884, lng:24.848 },
  { cat:'Muziejai', name:'„Entafarmos" farmacijos muziejus', desc:'Unikalus muziejus su senomis farmacijos knygomis, buteliais ir vaistų likučiais. Unikaliausias eksponatas – 200 metų senumo buteliukas iš Napoleono laikų kareivio. Lankymas nemokamas, iš anksto susitarus.', addr:'Klonėnų vs. 1, Jauniūnų sen.', tel:'+370 687 20642', web:'www.entafarma.lt', webUrl:'https://www.entafarma.lt/farmacijos-muziejus', lat:55.062, lng:24.978 },
  { cat:'Gyvūnai', name:'„Laimė dabar" ūkis', desc:'Šeimos susipažinimas su ūkio gyvūnais, jodinėjimas žirgais, žygiai gamtoje. Edukacija „Būkim draugais" – užsiėmimas su žirgu ar poniu. Pavėsinių nuoma šventėms.', addr:'Liūliškiai, Musninkų sen.', tel:'+370 693 93654', web:'facebook.com/LaimeDabar', webUrl:'https://www.facebook.com/LaimeDabar', lat:55.089, lng:24.923 },
  { cat:'Pramogos', name:'Dažasvydis „Vaidodažasvydis"', desc:'Dažasvydžio ir šratasvydžio žaidimai bet kuriuo metų laiku. Pramogos neribotas laikas, nuo 12 metų. Reikalinga bent 6 asmenų grupė.', addr:'Nečionių k., Širvintų raj.', tel:'+370 682 46722', web:'www.vaidodazasvydis.lt', webUrl:'https://www.vaidodazasvydis.lt', lat:55.038, lng:24.962 },
  { cat:'Aktyvus laisvalaikis', name:'MB „Kernavės pramogos"', desc:'Plaukimas baidarėmis, pasivažinėjimas keturračiais, dviračių nuoma Kernavės apylinkėse.', addr:'Kernavės sen., Ramunių g. 3', tel:'+370 627 34663', web:'www.kernavespramogos.lt', webUrl:'https://www.kernavespramogos.lt', lat:54.886, lng:24.852 },
  { cat:'Gamta', name:'Skautų slėnis', desc:'Skautų neformalaus ugdymo centras gamtoje. Edukacinės programos, stovyklos, mokymai, seminarai. Stovyklavietė, lauko programos grupėms.', addr:'Ežero g. 21, Špokiškio k.', tel:'+370 663 64451', web:'www.skautuslenis.lt', webUrl:'https://www.skautuslenis.lt', lat:55.021, lng:24.755 },
  { cat:'Dvasingumas', name:'Namgyal Stupa ir meditacijos parkas', desc:'Tibetietiška stupa, simbolizuojanti nušvitimą. Ekskursijos su gidu, meditacija, tibeto vienuolių ritualai. Veikia gegužė–lapkritis, penktadienis–sekmadienis. Būtina išankstinė registracija.', addr:'Rusokų k. 3, Musninkų sen.', tel:'+370 618 79700', web:'www.pagoda.lt', webUrl:'https://www.pagoda.lt', lat:55.094, lng:24.921 },
  { cat:'Gamta', name:'„Miško briedis" – ūkis ir miško mokykla', desc:'Neformalaus ugdymo veiklos gamtoje. Vaikų stovyklos, užsiėmimai mokinių grupėms, mokymai pedagogams. Pasivaikščiojimai su alpakomis.', addr:'Vičiūnų k., Kernavės sen.', tel:'+370 641 33555', web:'www.miskobriedis.lt', webUrl:'https://www.miskobriedis.lt', lat:54.921, lng:24.861 },
  { cat:'Kūryba', name:'Keramikos dirbtuvės „Medilių vėjai"', desc:'Keramikos dirbtuvės – pasigaminkite norimus keramikos gaminius. Tinka šeimoms, grupėms, įmonių renginiams.', addr:'Širvintų raj.', tel:'–', web:'–', webUrl:'', lat:55.043, lng:24.954 },
];

let activeFilter = 'Visi';

function getCategories() {
  const cats = ['Visi', ...new Set(PLACES.map(p => p.cat))];
  return cats;
}

function renderFilters() {
  const row = document.getElementById('filter-row');
  row.innerHTML = getCategories().map(cat => `
    <button class="filter-btn ${cat === activeFilter ? 'active' : ''}" onclick="setFilter('${cat}')">${cat}</button>
  `).join('');
}

function setFilter(cat) {
  activeFilter = cat;
  renderFilters();
  renderPlaces();
}

function renderPlaces() {
  const grid = document.getElementById('places-grid');
  const filtered = activeFilter === 'Visi' ? PLACES : PLACES.filter(p => p.cat === activeFilter);
  document.getElementById('count').textContent = `${filtered.length} objektų`;
  document.getElementById('no-results').style.display = filtered.length ? 'none' : 'block';
  grid.innerHTML = PLACES.map((p, i) => {
    const hide = activeFilter !== 'Visi' && p.cat !== activeFilter;
    return `<div class="place-card${hide ? ' hidden' : ''}" onclick="openDrawer(${i})">
      <div class="place-cat">${p.cat}</div>
      <div class="place-name">${p.name}</div>
    </div>`;
  }).join('');
}

function openDrawer(i) {
  const p = PLACES[i];
  document.getElementById('d-cat').textContent = p.cat;
  document.getElementById('d-title').textContent = p.name;
  document.getElementById('d-desc').textContent = p.desc;
  document.getElementById('d-addr').textContent = p.addr;
  document.getElementById('d-tel').textContent = p.tel;
  document.getElementById('d-web').textContent = p.web;
  document.getElementById('d-map-btn').onclick = () => window.open(`https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}`, '_blank');
  const webBtn = document.getElementById('d-web-btn');
  if (p.webUrl) { webBtn.href = p.webUrl; webBtn.style.opacity = '1'; webBtn.style.pointerEvents = 'auto'; }
  else { webBtn.href = '#'; webBtn.style.opacity = '0.4'; webBtn.style.pointerEvents = 'none'; }
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('show');
  document.body.style.overflow = '';
}

document.addEventListener('DOMContentLoaded', () => { renderFilters(); renderPlaces(); });
</script>
</body>
</html>
